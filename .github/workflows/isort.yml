name: Run isort

on:
  push:

jobs:
  isort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install -r dev-requirements.txt
      - name: run isort
        run: |
          isort --check-only --quiet .