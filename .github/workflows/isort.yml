name: Run isort

on:
  push:

jobs:
  isort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install isort
        run: |
          pip install isort==5.10.1
      - name: run isort
        run: |
          isort --check-only --quiet .